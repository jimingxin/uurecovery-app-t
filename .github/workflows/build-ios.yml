name: iOS Build & Sign

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 15.4

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p temp temp.keychain
          security import cert.p12 -k temp.keychain -P "$P12_PASSWORD" -A
          security default-keychain -s temp.keychain

      - name: Import provisioning profile
        env:
          PROV_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$PROV_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build & Archive
        run: |
          xcodebuild clean archive \
            -workspace UURecoveryApp.xcworkspace \
            -scheme UURecoveryApp \
            -configuration Release \
            -archivePath build/UURecoveryApp.xcarchive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/UURecoveryApp.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/*.ipa