name: iOS Build & Sign

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install CocoaPods
        working-directory: ./
        run: |
          sudo gem install cocoapods
          pod install

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p temp temp.keychain
          security list-keychains -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import cert.p12 -k temp.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temp temp.keychain
          security default-keychain -s temp.keychain

      - name: Import provisioning profile
        env:
          PROV_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$PROV_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Debug - List keychains and certificates
        run: |
          security list-keychains
          security find-certificate -a

      - name: Build & Archive
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
        run: |
          xcodebuild clean archive \
            -workspace UURecoveryApp.xcworkspace \
            -scheme UURecoveryApp \
            -configuration Release \
            -archivePath build/UURecoveryApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/UURecoveryApp.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/*.ipa